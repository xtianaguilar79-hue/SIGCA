<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Del problema compartido a la acción organizada</title>
  <desc id="desc">Diagrama de seis etapas: experiencia individual, interés colectivo, organización, acción colectiva, representación y negociación.</desc>
  <rect width="1600" height="900" fill="#f4f8fa"/><text x="80" y="100" font-family="Arial" font-size="56" font-weight="700" fill="#17324d">Del problema compartido a la acción organizada</text>
  <text x="80" y="150" font-family="Arial" font-size="27" fill="#526d82">Un recorrido posible. No es automático ni garantiza un resultado.</text>
  <g font-family="Arial" text-anchor="middle">
    <g transform="translate(70 290)"><rect width="220" height="220" rx="30" fill="#f2b134"/><text x="110" y="80" font-size="28" font-weight="700">Experiencia</text><text x="110" y="118" font-size="28" font-weight="700">individual</text><text x="110" y="170" font-size="21">Algo afecta</text><text x="110" y="198" font-size="21">a una persona</text></g>
    <g transform="translate(320 290)"><rect width="220" height="220" rx="30" fill="#6ab187"/><text x="110" y="80" font-size="28" font-weight="700">Interés</text><text x="110" y="118" font-size="28" font-weight="700">colectivo</text><text x="110" y="170" font-size="21">Se reconocen</text><text x="110" y="198" font-size="21">aspectos comunes</text></g>
    <g transform="translate(570 290)"><rect width="220" height="220" rx="30" fill="#5b8def"/><text x="110" y="100" font-size="28" font-weight="700" fill="white">Organización</text><text x="110" y="160" font-size="21" fill="white">Acuerdos, tareas</text><text x="110" y="190" font-size="21" fill="white">y continuidad</text></g>
    <g transform="translate(820 290)"><rect width="220" height="220" rx="30" fill="#c06c84"/><text x="110" y="80" font-size="28" font-weight="700" fill="white">Acción</text><text x="110" y="118" font-size="28" font-weight="700" fill="white">colectiva</text><text x="110" y="170" font-size="21" fill="white">Actuación</text><text x="110" y="198" font-size="21" fill="white">coordinada</text></g>
    <g transform="translate(1070 290)"><rect width="220" height="220" rx="30" fill="#9b6dcc"/><text x="110" y="80" font-size="28" font-weight="700" fill="white">Representación</text><text x="110" y="118" font-size="28" font-weight="700" fill="white">sindical</text><text x="110" y="170" font-size="21" fill="white">Canaliza lo</text><text x="110" y="198" font-size="21" fill="white">acordado</text></g>
    <g transform="translate(1320 290)"><rect width="220" height="220" rx="30" fill="#ef8354"/><text x="110" y="100" font-size="28" font-weight="700" fill="white">Negociación</text><text x="110" y="160" font-size="21" fill="white">Intercambio de</text><text x="110" y="190" font-size="21" fill="white">posiciones</text></g>
  </g>
  <g fill="#17324d"><path d="M290 400h22l-11-12zm0 0h22l-11 12z"/><path d="M540 400h22l-11-12zm0 0h22l-11 12z"/><path d="M790 400h22l-11-12zm0 0h22l-11 12z"/><path d="M1040 400h22l-11-12zm0 0h22l-11 12z"/><path d="M1290 400h22l-11-12zm0 0h22l-11 12z"/></g>
  <rect x="100" y="640" width="1400" height="120" rx="25" fill="#e3edf2"/><text x="800" y="690" font-family="Arial" font-size="28" text-anchor="middle" font-weight="700" fill="#17324d">La construcción colectiva requiere comunicación, participación y decisiones.</text><text x="800" y="735" font-family="Arial" font-size="24" text-anchor="middle" fill="#334e68">El delegado representa y canaliza: no reemplaza la decisión colectiva ni garantiza el resultado.</text>
</svg>
